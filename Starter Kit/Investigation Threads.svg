<svg viewBox="0 0 860 640" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
  <title>The Weight of Silence — Investigation Lead Map</title>
  <desc>Flowchart showing how clues connect locations and NPCs across the three investigation threads.</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#888"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c07840"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8a5cb8"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3cb87a"/>
    </marker>
    <marker id="arr-fenn" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6a8fc8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="640" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="430" y="22" text-anchor="middle" fill="#e8e8e8" font-size="13" font-weight="700" letter-spacing="1">THE WEIGHT OF SILENCE — INVESTIGATION MAP</text>

  <!-- Legend -->
  <rect x="20" y="34" width="10" height="10" fill="#2c3e7a" rx="2"/>
  <text x="35" y="44" fill="#aaa" font-size="9">Location</text>
  <rect x="95" y="34" width="10" height="10" fill="#5c3a1e" rx="2"/>
  <text x="110" y="44" fill="#aaa" font-size="9">Evidence</text>
  <rect x="170" y="34" width="10" height="10" fill="#3a1e5c" rx="2"/>
  <text x="185" y="44" fill="#aaa" font-size="9">NPC</text>
  <rect x="225" y="34" width="10" height="10" fill="#1e5c3a" rx="2"/>
  <text x="240" y="44" fill="#aaa" font-size="9">Resolution</text>

  <!-- ═══════════════ ACT 1 ═══════════════ -->

  <!-- Tribunal Hall -->
  <rect x="260" y="56" width="230" height="60" rx="5" fill="#2c3e7a" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="375" y="76" text-anchor="middle" fill="#e8e8e8" font-size="12" font-weight="700">THE TRIBUNAL HALL</text>
  <text x="375" y="91" text-anchor="middle" fill="#aac4e8" font-size="9">Act 1 begins · 2-hour clock starts</text>
  <text x="375" y="104" text-anchor="middle" fill="#7a9cc8" font-size="9">Mindspeech → Kalen in holding</text>

  <!-- Tomrin Fenn (optional contact, dashed border) -->
  <rect x="548" y="56" width="180" height="60" rx="5" fill="#1e2a5c" stroke="#6a8fc8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="638" y="76" text-anchor="middle" fill="#aac4e8" font-size="11" font-weight="700">ALDRIC FENN</text>
  <text x="638" y="91" text-anchor="middle" fill="#7a9cc8" font-size="9">Youngest magistrate · 24</text>
  <text x="638" y="104" text-anchor="middle" fill="#7a9cc8" font-size="9">Furious, outmaneuvered, listens</text>

  <!-- Tribunal → Fenn (optional approach) -->
  <line x1="490" y1="86" x2="548" y2="86" stroke="#6a8fc8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-fenn)"/>

  <!-- ═══════════════ ROW 2 — INVESTIGATION ENTRY POINTS ═══════════════ -->

  <!-- Broken Wheel Tavern -->
  <rect x="20" y="160" width="185" height="54" rx="5" fill="#2c3e7a" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="112" y="180" text-anchor="middle" fill="#e8e8e8" font-size="11" font-weight="700">BROKEN WHEEL</text>
  <text x="112" y="195" text-anchor="middle" fill="#aac4e8" font-size="9">Odel + 3 witnesses</text>
  <text x="112" y="207" text-anchor="middle" fill="#7a9cc8" font-size="9">→ Millers Lane, docks</text>

  <!-- VTC Counting House -->
  <rect x="260" y="160" width="230" height="54" rx="5" fill="#2c3e7a" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="375" y="180" text-anchor="middle" fill="#e8e8e8" font-size="11" font-weight="700">VTC COUNTING HOUSE</text>
  <text x="375" y="195" text-anchor="middle" fill="#aac4e8" font-size="9">Lock D14 / falcon window</text>
  <text x="375" y="207" text-anchor="middle" fill="#7a9cc8" font-size="9">Ground floor + subcellar</text>

  <!-- Counting House Inn -->
  <rect x="548" y="160" width="180" height="54" rx="5" fill="#2c3e7a" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="638" y="180" text-anchor="middle" fill="#e8e8e8" font-size="11" font-weight="700">COUNTING HOUSE INN</text>
  <text x="638" y="195" text-anchor="middle" fill="#aac4e8" font-size="9">Belar banking delegation</text>
  <text x="638" y="207" text-anchor="middle" fill="#7a9cc8" font-size="9">Needs documents to act</text>

  <!-- Tribunal → Row 2 -->
  <line x1="300" y1="116" x2="160" y2="160" stroke="#888" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3"/>
  <line x1="375" y1="116" x2="375" y2="160" stroke="#888" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3"/>
  <line x1="448" y1="116" x2="600" y2="160" stroke="#888" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3"/>

  <!-- ═══════════════ ROW 3 — EVIDENCE ═══════════════ -->

  <!-- Reth's Room -->
  <rect x="20" y="268" width="185" height="68" rx="5" fill="#5c3a1e" stroke="#c07840" stroke-width="1.5"/>
  <text x="112" y="287" text-anchor="middle" fill="#f0c878" font-size="11" font-weight="700">RETH'S ROOM</text>
  <text x="112" y="301" text-anchor="middle" fill="#e8b85a" font-size="9">Letter (Karrath consignment)</text>
  <text x="112" y="313" text-anchor="middle" fill="#e8b85a" font-size="9">List w/ crossed-out names</text>
  <text x="112" y="325" text-anchor="middle" fill="#e8b85a" font-size="9">Route map → Karrath</text>

  <!-- Ground Floor -->
  <rect x="248" y="268" width="152" height="68" rx="5" fill="#5c3a1e" stroke="#c07840" stroke-width="1.5"/>
  <text x="324" y="287" text-anchor="middle" fill="#f0c878" font-size="11" font-weight="700">GROUND FLOOR</text>
  <text x="324" y="301" text-anchor="middle" fill="#e8b85a" font-size="9">"Karrath consignment"</text>
  <text x="324" y="313" text-anchor="middle" fill="#e8b85a" font-size="9">in correspondence</text>
  <text x="324" y="325" text-anchor="middle" fill="#e8b85a" font-size="9">(specialty freight)</text>

  <!-- Subcellar -->
  <rect x="420" y="268" width="150" height="68" rx="5" fill="#5c3a1e" stroke="#c07840" stroke-width="1.5"/>
  <text x="495" y="287" text-anchor="middle" fill="#f0c878" font-size="11" font-weight="700">SUBCELLAR</text>
  <text x="495" y="301" text-anchor="middle" fill="#e8b85a" font-size="9">Draft contract</text>
  <text x="495" y="313" text-anchor="middle" fill="#e8b85a" font-size="9">"Class K" clause</text>
  <text x="495" y="325" text-anchor="middle" fill="#e8b85a" font-size="9">Liriel + Truthstone</text>

  <!-- Row 2 → Evidence -->
  <line x1="112" y1="214" x2="112" y2="268" stroke="#c07840" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <line x1="340" y1="214" x2="324" y2="268" stroke="#c07840" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <line x1="408" y1="214" x2="495" y2="268" stroke="#c07840" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- ═══════════════ ROW 4 — NPCs + DOCKS ═══════════════ -->

  <!-- Davan Reth -->
  <rect x="20" y="393" width="185" height="58" rx="5" fill="#3a1e5c" stroke="#8a5cb8" stroke-width="1.5"/>
  <text x="112" y="413" text-anchor="middle" fill="#d4a8f0" font-size="11" font-weight="700">DAVAN RETH</text>
  <text x="112" y="428" text-anchor="middle" fill="#b890d8" font-size="9">At docks if not found in room</text>
  <text x="112" y="440" text-anchor="middle" fill="#b890d8" font-size="9">Confirms all when cornered</text>

  <!-- The Docks (optional) -->
  <rect x="240" y="393" width="152" height="58" rx="5" fill="#2c3e7a" stroke="#4a6fa5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="316" y="413" text-anchor="middle" fill="#aac4e8" font-size="11" font-weight="700">THE DOCKS</text>
  <text x="316" y="428" text-anchor="middle" fill="#7a9cc8" font-size="9">Alt path to Reth</text>
  <text x="316" y="440" text-anchor="middle" fill="#7a9cc8" font-size="9">if not found at room</text>

  <!-- Liriel -->
  <rect x="420" y="393" width="150" height="58" rx="5" fill="#3a1e5c" stroke="#8a5cb8" stroke-width="1.5"/>
  <text x="495" y="413" text-anchor="middle" fill="#d4a8f0" font-size="11" font-weight="700">LIRIEL</text>
  <text x="495" y="428" text-anchor="middle" fill="#b890d8" font-size="9">Faerie Truthteller</text>
  <text x="495" y="440" text-anchor="middle" fill="#b890d8" font-size="9">Weakened · will cooperate</text>

  <!-- Evidence → NPCs -->
  <line x1="112" y1="336" x2="112" y2="393" stroke="#8a5cb8" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="495" y1="336" x2="495" y2="393" stroke="#8a5cb8" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <!-- Broken Wheel → Docks (alt path) -->
  <path d="M 205 187 Q 316 187 316 393" stroke="#888" stroke-width="1.2" fill="none" marker-end="url(#arr)" stroke-dasharray="4,3"/>

  <!-- Documents → Counting House Inn (curved) -->
  <path d="M 112 336 Q 112 372 200 382 Q 570 392 638 214" stroke="#c07840" stroke-width="1.2" fill="none" marker-end="url(#arr-orange)" stroke-dasharray="5,3"/>
  <text x="506" y="375" text-anchor="middle" fill="#c07840" font-size="8" font-style="italic">with documents</text>

  <!-- ═══════════════ ACT 3 — CONFRONTATION ═══════════════ -->

  <rect x="240" y="508" width="332" height="46" rx="5" fill="#5c2020" stroke="#c04040" stroke-width="2"/>
  <text x="406" y="527" text-anchor="middle" fill="#f0a0a0" font-size="12" font-weight="700">ACT 3 — THE CONFRONTATION</text>
  <text x="406" y="542" text-anchor="middle" fill="#d08080" font-size="9">Tribunal Hall · Voss breaks · fight or flight</text>

  <!-- Into Act 3 -->
  <line x1="112" y1="451" x2="278" y2="508" stroke="#3cb87a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="495" y1="451" x2="480" y2="508" stroke="#3cb87a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="638" y1="214" x2="544" y2="508" stroke="#3cb87a" stroke-width="1.2" fill="none" marker-end="url(#arr-green)" stroke-dasharray="5,3"/>
  <!-- Fenn → Act 3 (optional support) -->
  <line x1="638" y1="116" x2="535" y2="508" stroke="#6a8fc8" stroke-width="1.0" marker-end="url(#arr-fenn)" stroke-dasharray="5,3"/>

  <!-- ═══════════════ RESOLUTION ═══════════════ -->

  <rect x="20" y="578" width="358" height="48" rx="5" fill="#1e5c3a" stroke="#3cb87a" stroke-width="2"/>
  <text x="199" y="597" text-anchor="middle" fill="#78e8b0" font-size="11" font-weight="700">PATH A — TRIBUNAL</text>
  <text x="199" y="614" text-anchor="middle" fill="#a0d8b8" font-size="9">Liriel testifies · Truthstone proves lie · charges withdrawn</text>

  <rect x="398" y="578" width="442" height="48" rx="5" fill="#1e5c3a" stroke="#3cb87a" stroke-width="2"/>
  <text x="619" y="597" text-anchor="middle" fill="#78e8b0" font-size="11" font-weight="700">PATH B — BELAR DELEGATION</text>
  <text x="619" y="614" text-anchor="middle" fill="#a0d8b8" font-size="9">Documents presented · delegation halts signing · Voss loses cover</text>

  <!-- Act 3 → Resolution -->
  <line x1="340" y1="554" x2="240" y2="578" stroke="#3cb87a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="472" y1="554" x2="560" y2="578" stroke="#3cb87a" stroke-width="1.5" marker-end="url(#arr-green)"/>

</svg>
