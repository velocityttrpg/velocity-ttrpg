<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velocity — Skill Constellations</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
:root{--bg-deep:#060912;--bg-mid:#0c1326;--node-training:#6fb7ff;--node-mastery:#ffd76f;--node-category:#6fdf9f;--node-locked-ring:rgba(255,255,255,0.15);--line-color:rgba(140,180,255,0.3);--line-active:rgba(255,215,111,0.9);--card-bg:rgba(10,16,32,0.92);--card-border:rgba(140,180,255,0.4);--text-main:#eaf2ff;--text-dim:#93a3c0;--sidebar-bg:rgba(8,12,24,0.88);--sidebar-hover:rgba(111,183,255,0.13);--sidebar-active:rgba(111,183,255,0.26)}
*{box-sizing:border-box}
html,body{margin:0;padding:0;width:100%;height:100%;background:radial-gradient(ellipse at 50% 30%,var(--bg-mid) 0%,var(--bg-deep) 70%);color:var(--text-main);font-family:"Segoe UI",Trebuchet MS,sans-serif;overflow:hidden}
#app{position:absolute;inset:0;display:flex}
#sidebar{position:relative;z-index:6;width:340px;flex:0 0 340px;height:100%;overflow-y:auto;background:var(--sidebar-bg);border-right:1px solid rgba(140,180,255,0.14);backdrop-filter:blur(6px);padding:0 0 24px}
#sidebar-header{padding:10px 14px;border-bottom:1px solid rgba(140,180,255,0.14)}
#home-link{font-size:.72rem;color:var(--text-dim);text-decoration:none;letter-spacing:.08em;display:block;margin-bottom:6px}
#home-link:hover{color:var(--node-training)}
#sidebar-header h2{margin:0;font-size:1.25rem;letter-spacing:.14em;text-transform:uppercase;color:var(--node-training);text-shadow:0 0 14px rgba(111,183,255,.55)}
.group-section{margin-top:2px}
.group-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;cursor:pointer;padding:8px 14px 6px;color:var(--text-dim);font-size:.9rem;letter-spacing:.2em;text-transform:uppercase;font-family:inherit;transition:color .15s}
.group-toggle:hover,.group-toggle.active-group{color:var(--node-category)}
.group-toggle .arrow{font-size:.6rem;transition:transform .2s;margin-left:6px}
.group-toggle.collapsed .arrow{transform:rotate(-90deg)}
.group-items{overflow:hidden}
.group-items.collapsed{display:none}
.tree-item{display:block;width:100%;text-align:left;background:none;border:none;color:var(--text-main);font-size:1.25rem;padding:6px 16px 6px 26px;cursor:pointer;transition:background .13s,color .13s;font-family:inherit}
.tree-item:hover{background:var(--sidebar-hover)}
.tree-item.active{background:var(--sidebar-active);color:var(--node-training);font-weight:600}
#main{position:relative;flex:1 1 auto;height:100%;overflow:hidden}
#breadcrumb{position:absolute;top:10px;left:20px;z-index:7;font-size:.78rem;color:var(--text-dim);letter-spacing:.04em;display:flex;align-items:center;gap:6px}
.bc-link{color:var(--text-dim);cursor:pointer;transition:color .13s}
.bc-link:hover{color:var(--node-training)}
.bc-sep{opacity:.4}
.bc-current{color:var(--text-main)}
#header{position:absolute;top:0;left:0;width:100%;text-align:center;padding:18px 0 8px;z-index:5;pointer-events:none}
#header h1{margin:0;font-size:1.5rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--node-training);text-shadow:0 0 14px rgba(111,183,255,.55)}
#header p{margin:4px 0 0;font-size:.82rem;color:var(--text-dim);letter-spacing:.05em}
#stars{position:absolute;inset:0;z-index:0}
#constellation-wrap{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center}
svg#constellation{width:96%;max-width:1300px;height:auto;overflow:visible}
.link{stroke:var(--line-color);stroke-width:1.5;fill:none;transition:stroke .25s,filter .25s}
.link.active{stroke:var(--line-active);stroke-width:2.5;filter:drop-shadow(0 0 5px var(--line-active))}
.node-group{cursor:pointer}
.node-halo{fill:transparent;stroke:var(--node-locked-ring);stroke-width:1;transition:stroke .25s}
.node-core{transition:filter .22s}
.node-core.training{fill:var(--node-training);filter:drop-shadow(0 0 5px rgba(111,183,255,.7))}
.node-core.mastery{fill:var(--node-mastery);filter:drop-shadow(0 0 5px rgba(255,215,111,.7))}
.node-core.category{fill:var(--node-category);filter:drop-shadow(0 0 7px rgba(111,223,159,.75))}
.node-group:hover .node-halo{stroke:rgba(255,255,255,.45)}
.node-group:hover .node-core.training{filter:drop-shadow(0 0 16px rgba(111,183,255,1)) drop-shadow(0 0 28px rgba(111,183,255,.7))}
.node-group:hover .node-core.mastery{filter:drop-shadow(0 0 16px rgba(255,215,111,1)) drop-shadow(0 0 28px rgba(255,215,111,.7))}
.node-group:hover .node-core.category{filter:drop-shadow(0 0 16px rgba(111,223,159,1)) drop-shadow(0 0 28px rgba(111,223,159,.7))}
.node-label{fill:var(--text-main);font-size:13px;font-weight:600;text-anchor:middle;pointer-events:none;letter-spacing:.03em}
.node-roman{fill:var(--text-dim);font-size:11px;text-anchor:middle;pointer-events:none;letter-spacing:.1em}
.tier-label{fill:var(--text-dim);font-size:12px;text-anchor:middle;letter-spacing:.25em;text-transform:uppercase;pointer-events:none;opacity:.65}
#card{position:absolute;z-index:10;width:300px;padding:15px 18px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;box-shadow:0 0 22px rgba(111,183,255,.22),0 8px 24px rgba(0,0,0,.6);backdrop-filter:blur(6px);opacity:0;transform:translateY(6px) scale(.98);transition:opacity .13s,transform .13s;pointer-events:none}
#card.visible{opacity:1;transform:translateY(0) scale(1)}
.card-tier{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px}
.card-title{font-size:1.1rem;font-weight:700;margin-bottom:8px}
.card-title.training{color:var(--node-training)}
.card-title.mastery{color:var(--node-mastery)}
.card-title.category{color:var(--node-category)}
.card-row{font-size:.8rem;color:var(--text-dim);margin-bottom:4px;display:flex;justify-content:space-between;gap:12px}
.card-row span:last-child{color:var(--text-main);text-align:right}
.card-effect{margin-top:10px;font-size:.85rem;line-height:1.45;color:var(--text-main);border-top:1px solid rgba(255,255,255,.07);padding-top:8px}
.card-hint{margin-top:8px;font-size:.74rem;color:var(--text-dim);font-style:italic}
#legend-wrap{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:28px;font-size:.76rem;color:var(--text-dim);z-index:5;letter-spacing:.05em;pointer-events:none}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle}
.dot.training{background:var(--node-training);box-shadow:0 0 5px var(--node-training)}
.dot.mastery{background:var(--node-mastery);box-shadow:0 0 5px var(--node-mastery)}
</style>
</head>

    <div id="sidebar-header">
      <a href="index.html" id="home-link">&#8592; Home</a>

    </div>
    <div id="sidebar-groups"></div>

        <g id="links"></g>
        <g id="nodes"></g>

    </div>
    <div id="card"></div>
    <div id="legend-wrap"></div>
  </div>
</div>

  "influence":{nodes:[{key:"influence",label:"Influence\n(Trunk)",x:550,y:185},{key:"persuasion",label:"Persuasion",x:245,y:370},{key:"intimidation",label:"Intimidation",x:550,y:430},{key:"negotiation",label:"Negotiation",x:855,y:370}],edges:[["influence","persuasion"],["influence","intimidation"],["influence","negotiation"],["persuasion","negotiation"]]},
  "survival":{nodes:[{key:"athletics",label:"Athletics",x:185,y:215},{key:"medicine",label:"Medicine",x:460,y:130},{key:"stealth",label:"Stealth",x:785,y:195},{key:"tracking",label:"Tracking",x:850,y:405},{key:"wilderness",label:"Wilderness",x:315,y:445}],edges:[["athletics","medicine"],["medicine","stealth"],["stealth","tracking"],["tracking","wilderness"],["wilderness","athletics"],["athletics","tracking"],["medicine","wilderness"]]},
  "investigation":{nodes:[{key:"investigation",label:"Investigation\n(Trunk)",x:550,y:175},{key:"forensics",label:"Forensics",x:230,y:310},{key:"research",label:"Research",x:355,y:450},{key:"supernatural-detection",label:"Supernatural\nDetection",x:750,y:450},{key:"situational-awareness",label:"Situational\nAwareness",x:880,y:305}],edges:[["investigation","forensics"],["investigation","research"],["investigation","supernatural-detection"],["investigation","situational-awareness"],["forensics","research"],["situational-awareness","supernatural-detection"]]},
  "attributes":{nodes:[{key:"dominance",label:"Dominance",x:200,y:200},{key:"empathy",label:"Empathy",x:450,y:130},{key:"fortitude",label:"Fortitude",x:720,y:168},{key:"reflex",label:"Reflex",x:900,y:325},{key:"strength",label:"Strength",x:790,y:460},{key:"vitality",label:"Vitality",x:480,y:510},{key:"willpower",label:"Willpower",x:235,y:435}],edges:[["dominance","empathy"],["empathy","fortitude"],["fortitude","reflex"],["reflex","strength"],["strength","vitality"],["vitality","willpower"],["willpower","dominance"],["empathy","willpower"],["fortitude","strength"]]},
};

let navState={view:"root",group:null,skill:null};
const groupOpen={};GROUPS.forEach(([n])=>{groupOpen[n]=false;});
const linksGroup=document.getElementById("links");
const nodesGroup=document.getElementById("nodes");
const card=document.getElementById("card");
const treeTitle=document.getElementById("tree-title");
const treeSub=document.getElementById("tree-subtitle");
const leftLabel=document.getElementById("left-tier-label");
const rightLabel=document.getElementById("right-tier-label");
const legendWrap=document.getElementById("legend-wrap");
const breadcrumb=document.getElementById("breadcrumb");

function navigate(view,group,skill){
  navState={view,group:group||null,skill:skill||null};
  hideCard();leftLabel.textContent="";rightLabel.textContent="";
  legendWrap.innerHTML="";linksGroup.innerHTML="";nodesGroup.innerHTML="";
  updateBreadcrumb();updateSidebarActive();
  if(view==="root")renderRoot();
  else if(view==="category")renderCategory(group);
  else renderSkillLine(skill);
}
function groupNameForSlug(slug){return Object.entries(GROUP_SLUGS).find(([,v])=>v===slug)?.[0]||slug;}
function updateBreadcrumb(){
  const{view,group,skill}=navState;
  if(view==="root"){breadcrumb.innerHTML="";return;}
  const gn=groupNameForSlug(group);
  if(view==="category"){
    breadcrumb.innerHTML=`<span class="bc-link" onclick="navigate('root')">Skill Constellations</span><span class="bc-sep">/</span><span class="bc-current">${gn}</span>`;
  }else{
    const st=skill?SKILLS[skill]?.title:"";
    breadcrumb.innerHTML=`<span class="bc-link" onclick="navigate('root')">Skill Constellations</span><span class="bc-sep">/</span><span class="bc-link" onclick="navigate('category','${group}')">${gn}</span><span class="bc-sep">/</span><span class="bc-current">${st}</span>`;
  }
}
function buildSidebar(){
  const container=document.getElementById("sidebar-groups");
  GROUPS.forEach(([groupName,items])=>{
    const slug=GROUP_SLUGS[groupName];
    const section=document.createElement("div");section.classList.add("group-section");section.dataset.slug=slug;
    const toggle=document.createElement("button");toggle.classList.add("group-toggle","collapsed");
    toggle.innerHTML=`<span>${groupName}</span><span class="arrow">&#9660;</span>`;
    const itemsEl=document.createElement("div");itemsEl.classList.add("group-items","collapsed");
    toggle.addEventListener("click",()=>{
      const wasOpen=groupOpen[groupName];
      groupOpen[groupName]=!wasOpen;
      toggle.classList.toggle("collapsed",wasOpen);
      itemsEl.classList.toggle("collapsed",wasOpen);
      if(!wasOpen)navigate("category",slug);
    });
    items.forEach(([key,label])=>{
      const btn=document.createElement("button");btn.classList.add("tree-item");btn.textContent=label;
      btn.dataset.key=key;btn.dataset.group=slug;
      btn.addEventListener("click",e=>{e.stopPropagation();navigate("skill",slug,key);});
      itemsEl.appendChild(btn);
    });
    section.appendChild(toggle);section.appendChild(itemsEl);container.appendChild(section);
  });
}
function updateSidebarActive(){
  const{group,skill}=navState;
  document.querySelectorAll(".group-toggle").forEach(t=>{t.classList.toggle("active-group",t.closest(".group-section").dataset.slug===group);});
  document.querySelectorAll(".tree-item").forEach(b=>{b.classList.toggle("active",b.dataset.key===skill);});
  if(group){
    document.querySelectorAll(".group-section").forEach(sec=>{
      if(sec.dataset.slug===group){
        const gn=groupNameForSlug(group);
        if(groupOpen[gn]){
          sec.querySelector(".group-toggle").classList.remove("collapsed");
          sec.querySelector(".group-items").classList.remove("collapsed");
        }
      }
    });
  }
}
const NS="http://www.w3.org/2000/svg";
function svgEl(tag,attrs){const el=document.createElementNS(NS,tag);Object.entries(attrs||{}).forEach(([k,v])=>el.setAttribute(k,v));return el;}
function drawEdges(edges,nodeMap){
  edges.forEach(([a,b])=>{
    const na=nodeMap[a],nb=nodeMap[b];if(!na||!nb)return;
    const mx=(na.x+nb.x)/2,my=(na.y+nb.y)/2-30;
    linksGroup.appendChild(svgEl("path",{d:`M ${na.x} ${na.y} Q ${mx} ${my} ${nb.x} ${nb.y}`,class:"link"}));
  });
}
function drawNavNode(n,coreClass,r,haloR,onClick,onEnter,onLeave){
  const g=svgEl("g",{class:"node-group"});
  g.appendChild(svgEl("circle",{cx:n.x,cy:n.y,r:haloR,class:"node-halo"}));
  g.appendChild(svgEl("circle",{cx:n.x,cy:n.y,r:r,class:`node-core ${coreClass}`}));
  const lines=n.label.split("\n");
  const labelEl=svgEl("text",{x:n.x,y:n.y+haloR+4,class:"node-label"});
  lines.forEach((line,i)=>{const ts=svgEl("tspan",{x:n.x,dy:i===0?"0":"1.3em"});ts.textContent=line;labelEl.appendChild(ts);});
  g.appendChild(labelEl);
  if(onClick)g.addEventListener("click",onClick);
  if(onEnter)g.addEventListener("mouseenter",onEnter);
  if(onLeave)g.addEventListener("mouseleave",onLeave);
  g.addEventListener("mousemove",positionCard);
  nodesGroup.appendChild(g);
}
function renderRoot(){
  treeTitle.textContent="Skill Constellations";treeSub.textContent="Select a category to explore its skill lines";
  const nodeMap={};ROOT_NODES.forEach(n=>nodeMap[n.id]=n);drawEdges(ROOT_EDGES,nodeMap);
  ROOT_NODES.forEach(n=>{
    const gn=groupNameForSlug(n.id);
    const grp=GROUPS.find(([nm])=>GROUP_SLUGS[nm]===n.id);const count=grp?grp[1].length:0;
    drawNavNode(n,"category",16,28,()=>navigate("category",n.id),
      (e)=>{card.innerHTML=`<div class="card-tier">Category</div><div class="card-title category">${gn}</div><div class="card-effect">${count} skill line${count!==1?"s":""}</div><div class="card-hint">Click to explore</div>`;card.classList.add("visible");positionCard(e);},
      hideCard);
  });
}
function renderCategory(slug){
  const data=CATEGORY_DATA[slug];const gn=groupNameForSlug(slug);
  treeTitle.textContent=gn;treeSub.textContent="Select a skill line to view its constellation";
  if(!data)return;
  const nodeMap={};data.nodes.forEach(n=>nodeMap[n.key]=n);drawEdges(data.edges,nodeMap);
  data.nodes.forEach(n=>{
    const tree=SKILLS[n.key];const count=tree?tree.skills.length:0;
    drawNavNode(n,"training",14,24,()=>navigate("skill",slug,n.key),
      (e)=>{card.innerHTML=`<div class="card-tier">Skill Line</div><div class="card-title training">${tree?tree.title:n.key}</div><div class="card-effect">${count} skill${count!==1?"s":""}</div><div class="card-hint">Click to view skill line</div>`;card.classList.add("visible");positionCard(e);},
      hideCard);
  });
}
function computeLayout(skills){
  const n=skills.length;if(n===1)return[[550,280]];
  const marginX=90,width=1100-marginX*2,midY=280,amp=130;
  return skills.map((_,i)=>{const t=i/(n-1);return[marginX+t*width,midY+Math.sin(t*Math.PI*2.4)*amp];});
}
function renderSkillLine(key){
  const tree=SKILLS[key];if(!tree)return;
  const skills=tree.skills,positions=computeLayout(skills);
  const hasMastery=skills.some(s=>s.tier==="mastery");
  treeTitle.textContent=tree.title;treeSub.textContent="Universal \xb7 hover a node for details";
  if(hasMastery){leftLabel.textContent="Training Tier";rightLabel.textContent="Mastery Tier";legendWrap.innerHTML=`<div><span class="dot training"></span>Training</div><div><span class="dot mastery"></span>Mastery</div>`;}
  else{legendWrap.innerHTML=`<div><span class="dot training"></span>Skill Line</div>`;}
  const byName={};skills.forEach((s,i)=>{byName[s.name]={skill:s,pos:positions[i]};});
  skills.forEach((s,i)=>{
    const prereq=byName[s.prerequisite];if(!prereq)return;
    const[x1,y1]=prereq.pos,[x2,y2]=positions[i];const mx=(x1+x2)/2,my=(y1+y2)/2-40;
    const path=svgEl("path",{d:`M ${x1} ${y1} Q ${mx} ${my} ${x2} ${y2}`,class:"link"});
    path.dataset.from=prereq.skill.id;path.dataset.to=s.id;linksGroup.appendChild(path);
  });
  skills.forEach((s,i)=>{
    const[x,y]=positions[i];const g=svgEl("g",{class:"node-group","data-id":s.id});
    g.appendChild(svgEl("circle",{cx:x,cy:y,r:20,class:"node-halo"}));
    g.appendChild(svgEl("circle",{cx:x,cy:y,r:9,class:`node-core ${s.tier==="mastery"?"mastery":"training"}`}));
    const roman=svgEl("text",{x,y:y-28,class:"node-roman"});roman.textContent=s.roman;
    const label=svgEl("text",{x,y:y+36,class:"node-label"});label.textContent=s.name;
    g.appendChild(roman);g.appendChild(label);
    g.addEventListener("mouseenter",(e)=>{
      card.innerHTML=`<div class="card-tier">${s.tier==="mastery"?"Mastery Tier":"Training Tier"}</div><div class="card-title ${s.tier==="mastery"?"mastery":"training"}">${s.name}</div><div class="card-row"><span>Cost</span><span>${s.cost}</span></div><div class="card-row"><span>Prerequisite</span><span>${s.prerequisite}</span></div><div class="card-effect">${s.effect}</div>`;
      card.classList.add("visible");
      positionCard(e);
      document.querySelectorAll(".link").forEach(l=>l.classList.remove("active"));
      let cur=s;while(cur){const link=document.querySelector(`.link[data-to="${cur.id}"]`);if(link)link.classList.add("active");const p=byName[cur.prerequisite];cur=p?p.skill:null;}
    });
    g.addEventListener("mouseleave",hideCard);g.addEventListener("mousemove",positionCard);nodesGroup.appendChild(g);
  });
}
function hideCard(){card.classList.remove("visible");document.querySelectorAll(".link").forEach(l=>l.classList.remove("active"));}
function positionCard(e){
  const m=18;
  const mainRect=document.getElementById("main").getBoundingClientRect();
  const cw=card.offsetWidth||300,ch=card.offsetHeight||100;
  let x=e.clientX-mainRect.left+m,y=e.clientY-mainRect.top+m;
  if(x+cw>mainRect.width)x=e.clientX-mainRect.left-cw-m;
  if(x<m)x=m;
  if(y+ch>mainRect.height)y=mainRect.height-ch-m;
  if(y<m)y=m;
  card.style.left=x+"px";card.style.top=y+"px";
}
const canvas=document.getElementById("stars"),ctx=canvas.getContext("2d");
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;drawStars();}
function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const count=Math.floor(canvas.width*canvas.height/3500);
  for(let i=0;i<count;i++){
    const x=Math.random()*canvas.width,y=Math.random()*canvas.height,r=Math.random()*1.3+.2,a=Math.random()*.55+.15;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=`rgba(191,225,255,${a})`;ctx.fill();
  }
}
window.addEventListener("resize",resize);resize();
buildSidebar();navigate('root');
</script>
</body>
