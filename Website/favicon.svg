<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#0c1326"/>
      <stop offset="100%" stop-color="#060912"/>
    </radialGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd76f"/>
      <stop offset="55%" stop-color="#9fcfff"/>
      <stop offset="100%" stop-color="#6fb7ff"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- small companion stars (constellation motif) -->
  <circle cx="14" cy="16" r="1.6" fill="#9fcfff" opacity="0.85"/>
  <circle cx="50" cy="14" r="1.3" fill="#ffd76f" opacity="0.8"/>
  <circle cx="50" cy="48" r="1.6" fill="#6fb7ff" opacity="0.85"/>
  <circle cx="13" cy="47" r="1.2" fill="#ffd76f" opacity="0.7"/>

  <!-- main four-point star (mastery node) -->
  <path d="M32 10
           C 33 22, 34 30, 47 32
           C 34 34, 33 42, 32 54
           C 31 42, 30 34, 17 32
           C 30 30, 31 22, 32 10 Z"
        fill="url(#star)"/>

  <circle cx="32" cy="32" r="3.2" fill="#fff8e6"/>
</svg>
